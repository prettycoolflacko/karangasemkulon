version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dusun-backend
    restart: unless-stopped
    volumes:
      # Menggunakan Bind Mount: Container akan langsung membaca/menulis ke file ini
      - ./backend/dusun.db:/app/dusun.db
      # Menggunakan Bind Mount untuk folder gambar
      - ./frontend/public/images:/shared-images
    environment:
      # Arahkan backend ke database yang sudah ter-mount
      - DATABASE_URL=sqlite:////app/dusun.db
      - IMAGE_STORAGE_PATH=/shared-images
      - ENVIRONMENT=production

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://karangasemkulon.anirveda.rocks
    container_name: dusun-frontend
    restart: unless-stopped
    volumes:
      # Menggunakan Bind Mount: Menghubungkan langsung ke folder lokal frontend
      - ./frontend/public/images:/app/public/images
    environment:
      - NEXT_PUBLIC_API_URL=https://karangasemkulon.anirveda.rocks
      - HOSTNAME=0.0.0.0
    depends_on:
      - backend

  # Nginx: Gateway terpusat yang melayani gambar LANGSUNG dari disk
  # Ini memastikan gambar yang baru diupload langsung tampil tanpa rebuild
  nginx:
    image: nginx:alpine
    container_name: dusun-nginx
    restart: unless-stopped
    ports:
      - "3003:80"
    volumes:
      # File konfigurasi Nginx
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Folder gambar di-mount LANGSUNG — bypass Next.js sepenuhnya
      - ./frontend/public/images:/data/images:ro
    depends_on:
      - backend
      - frontend
