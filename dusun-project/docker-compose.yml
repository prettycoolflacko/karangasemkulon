version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dusun-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Menggunakan Bind Mount: Container akan langsung membaca/menulis ke file ini
      - ./backend/dusun.db:/app/dusun.db
      # Menggunakan Bind Mount untuk folder gambar
      - ./frontend/public/images:/shared-images
    environment:
      # Arahkan backend ke database yang sudah ter-mount
      - DATABASE_URL=sqlite:////app/dusun.db
      - IMAGE_STORAGE_PATH=/shared-images
      - ENVIRONMENT=production

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://karangasemkulon.anirveda.rocks
    container_name: dusun-frontend
    restart: unless-stopped
    ports:
      - "3003:3000"
    volumes:
      # Menggunakan Bind Mount: Menghubungkan langsung ke folder lokal frontend
      - ./frontend/public/images:/app/public/images
    environment:
      # Tell frontend where to reach backend for API calls (via browser)
      # WARNING: Change this IP to the actual IP address of your home server!
      - NEXT_PUBLIC_API_URL=https://karangasemkulon.anirveda.rocks
      - HOSTNAME=0.0.0.0
    depends_on:
      - backend
